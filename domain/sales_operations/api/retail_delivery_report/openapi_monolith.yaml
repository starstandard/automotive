      style: form
      explode: true
      schema:
        maxLength: 10
        minLength: 0
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        type: string
        format: date
        example: 2026-02-09
    PageNumberQuery:
      name: page_number
      in: query
      description: The number of returned page
