      description: Check the progress or result of a previously submitted command.
      operationId: getRetailDeliveryReportCommandStatus
      parameters:
      - name: retailDeliveryReportKey
        in: path
        required: true
        schema:
          type: string
          format: string
      - name: commandId
        in: path
        required: true
        schema:
          type: string
          format: string
