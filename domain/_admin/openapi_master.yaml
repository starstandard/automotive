openapi: 3.0.1
info:
  title: Master Consolidated API
  description: Automated consolidation of domain-specific schemas
  version: 1.0.0
servers:
- url: /
components:
  schemas:
    AccountingPeriod:
      type: object
      properties:
        identifiers:
          $ref: "#/components/schemas/Identifiers"
        period_desc:
          type: string
          description: Detailed narrative description of the period's scope.
          example: Third Quarter Fiscal Year 2026 - North American Operations
        accounting_period_id:
          type: string
          description: System-level unique identifier for the period record.
          example: ap-2026-07-v1
        accounting_period_key:
          type: string
          description: Business-logical key following the chronological YYYYMM format.
          example: "202607"
        period_name:
          type: string
          description: Short-hand display name for the period.
          example: July 2026
        start_date:
          type: string
          description: The inclusive start date of the period in ISO-8601 format.
          format: date
          example: 2026-04-11
        end_date:
          type: string
          description: The inclusive end date of the period in ISO-8601 format.
          format: date
          example: 2026-04-05
        accounting_period_status_type:
          $ref: "#/components/schemas/AccountingPeriodStatusTypes"
        fiscal_year:
          type: integer
          description: The 4-digit fiscal year designation.
          format: int32
          example: 2026
      description: "Defines a fiscal period, including its unique identifiers, start\
        \ and end dates, and current status."
    AccountingPeriodCreate:
      required:
      - accounting_period_key
      type: object
      description: AccountingPeriod Create for Post
      allOf:
      - $ref: "#/components/schemas/AccountingPeriod"
    AccountingPeriodStatusTypes:
      type: string
      description: types of accounting period status.
      enum:
      - FUTURE
      - OPEN
      - ADJUSTMENT
      - PENDING_CLOSURE
      - CLOSED
      - LOCKED
      - OTHER
    AccountingPeriodUpdate:
      type: object
      properties:
        end_date:
          type: string
          description: The inclusive end date of the period in ISO-8601 format.
          format: date
          example: 2026-04-15
        period_desc:
          type: string
          description: Detailed narrative description of the period's scope.
          example: Third Quarter Fiscal Year 2026 - North American Operations
        fiscal_year:
          type: integer
          description: The 4-digit fiscal year designation.
          format: int32
          example: 2026
        identifiers:
          $ref: "#/components/schemas/Identifiers"
        accounting_period_status_type:
          $ref: "#/components/schemas/AccountingPeriodStatusTypes"
        period_name:
          type: string
          description: Short-hand display name for the period.
          example: July 2026
        start_date:
          type: string
          description: The inclusive start date of the period in ISO-8601 format.
          format: date
          example: 2026-04-15
      description: AccountingPeriod Update for Patch and Put
