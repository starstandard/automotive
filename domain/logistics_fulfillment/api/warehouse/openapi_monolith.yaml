      - OEM_WAREHOUSE
      - PARTS_SUPPLIER
      - REGIONAL_DISTRIBUTION_CENTER
      - NATIONAL_DISTRIBUTION_CENTER
      - RETURN_CORE_CENTER
      - IN_HOUSE_PARTS_STORAGE
      - DISTRIBUTOR
      - THIRD_PARTY_LOGISTICS
      - AFTERMARKET_SUPPLIER
      - BODY_SHOP_WAREHOUSE
      - TIRES_ONLY_DISTRIBUTION
      - ACCESSORY_WAREHOUSE
      - USED_PARTS_YARD
      - MOBILE_PARTS_UNIT
      - OTHER
    WarehouseUpdate:
