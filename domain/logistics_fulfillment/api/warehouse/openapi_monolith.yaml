          example: vehicle_identifiers
          items:
            type: string
        addresses:
          $ref: "#/components/schemas/Addresses"
      description: Warehouse represents a physical or virtual storage location for
        inventory and assets.
    WarehouseCreate:
      required:
      - warehouse_key
      type: object
      description: Warehouse Create for Post
