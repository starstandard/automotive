        warehouse_name:
          type: string
          description: Descriptive name of the warehouse.
          example: Atlanta Regional Distribution Center
        vehicle_identifiers:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          description: Updated list of vehicle identifiers associated with the warehouse.
          example: vehicle_identifiers
          items:
            type: string
        warehouse_code:
          type: string
          description: Code of the warehouse.
          example: WH-ATL-01
        identifiers:
          $ref: "#/components/schemas/Identifiers"
        warehouse_types:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          description: warehouse_types list
          example:
