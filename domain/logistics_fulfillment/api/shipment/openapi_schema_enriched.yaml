      - DELIVERED
      - MANIFEST_CREATED
      - CLOSED
      - RETURN_INITIATED
      - RETURNED_TO_SENDER
      - LOST_IN_TRANSIT
      - RETURNED_TO_WAREHOUSE
    ShipmentUpdate:
      type: object
      properties:
        shipping_carriers:
          $ref: "#/components/schemas/PartyReferences"
        identifiers:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
        country_of_origin:
          type: string
          description: Full name of the country.
        invoice_references:
          $ref: "#/components/schemas/InvoiceReferences"
        ship_from_party:
          $ref: "#/components/schemas/PartyReference"
        packing_slip_number:
          type: string
          description: Number from the supplier's packing slip.
          example: PS-2025-54321
        tracking_information:
          $ref: "#/components/schemas/TrackingInformations"
        ship_to_party:
          $ref: "#/components/schemas/PartyReference"
        unit_of_measures:
          $ref: "#/components/schemas/UnitOfMeasures"
        shipment_status_type:
          $ref: "#/components/schemas/ShipmentStateTypes"
        shipping_method_type:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          items:
            $ref: "#/components/schemas/ShippingMethodTypes"
        address_references:
          $ref: "#/components/schemas/AddressReferences"
        bill_of_lading_number:
          type: string
          description: The Bill of Lading number for freight shipments.
          example: BOL-XYZ-9876
        tracking_number:
          type: string
          description: Tracking number provided by the shipping carrier.
          example: 1Z999AA99999999999
        case_number:
          type: string
          description: The unique identifier case number
          example: inv_789def456
        shipment_events:
          $ref: "#/components/schemas/ShipmentEvents"
        invoice_number:
          type: string
          description: The unique identifier of the parent invoice to which this shipment
            belongs.
          example: inv_789def456
        part_references:
          $ref: "#/components/schemas/PartReferences"
      description: Shipment Update for Patch and Put
    ShippingMethodTypes:
      type: string
      description: types of shipping methods.
      enum:
      - OVERNIGHT
      - GROUND
      - LOCAL_DELIVERY
      - TWO_DAY_AIR
      - THREE_DAY_SELECT
      - EXPRESS
      - INTERNATIONAL_STANDARD
      - INTERNATIONAL_EXPEDITED
      - FREIGHT
      - DOWNLOAD
      - PALLET_DELIVERY
      - PICKUP
      - SAME_DAY
      - ECONOMY
      - HAZMAT
      - TEMPERATURE_CONTROLLED
      - FREE_SHIPPING
      - FLAT_RATE
      - TABLE_RATE
      - CURBSIDE_PICKUP
      - LOCKER_DELIVERY
      - ECO_FRIENDLY
      - HYBRID_SHIPPING
      - AIR_FREIGHT
      - OCEAN_FREIGHT
      - RAIL_FREIGHT
    TimeSlot:
      type: object
      properties:
        time_slot_id:
          type: string
          description: Technical unique identifier (GUID) for the time slot record.
          example: b2d3e4f5-a6b7-c8d9-e0f1-a2b3c4d5e6f7
        time_slot_key:
          type: string
          description: Natural business key for the time slot within its specific
            context.
          example: TS-MON-MORNING-SHIFT
        time_slot_source:
          type: string
          description: The originating system or calendar providing this availability
            data.
          example: GOOGLE_CALENDAR
        start_day:
          $ref: "#/components/schemas/DaysOfWeekTypes"
        start_time:
          pattern: "^([01]\\d|2[0-3]):([0-5]\\d):([0-5]\\d)$"
          type: string
          description: The local start time in 24-hour ISO 8601 format.
          format: date-time
        end_day:
          $ref: "#/components/schemas/DaysOfWeekTypes"
        end_time:
          pattern: "^([01]\\d|2[0-3]):([0-5]\\d):([0-5]\\d)$"
          type: string
          description: The local end time in 24-hour ISO 8601 format.
          format: date-time
        recurring_indicator:
          type: boolean
          description: Indicates if this time slot is part of a repeating pattern.
          example: true
        timeslot_directive_types:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          items:
            $ref: "#/components/schemas/TimeslotDirectiveTypes"
        week_of_date:
          $ref: "#/components/schemas/Codes"
      description: "Defines a specific window of time, often within a recurring schedule,\
        \ used for service availability or appointment booking."
    TimeSlots:
      type: array
      items:
        $ref: "#/components/schemas/TimeSlot"
    TimeslotDirectiveTypes:
      type: string
      description: types of timeslot directives.
      enum:
      - AFTER
      - ANYTIME
      - BEFORE
      - BETWEEN
      - BLOCK
      - UNKNOWN
    TrackingInformation:
      type: object
      properties:
        tracking_information_key:
          type: string
          description: Unique key identifying this specific tracking information entry.
          example: track_info_abc123
        tracking_information_id:
          type: string
          description: "Identifier for this specific tracking information entry, often\
            \ an external ID from the carrier."
          example: TRACK-UPDATE-20250812-001
        tracking_number:
          type: string
          description: The unique tracking number provided by the carrier.
          example: 1Z9999999999999999
        tracking_date_time:
          type: string
          description: Date and time when this specific tracking update was recorded.
          format: date-time
          example: 2026-05-07T17:18:52Z
        tracking_status:
          $ref: "#/components/schemas/ShipmentStateTypes"
        status_description:
          type: string
          description: A human-readable description of the tracking status.
          example: Package is currently in transit to destination facility.
        current_location:
          $ref: "#/components/schemas/Position"
        shipment_events:
          $ref: "#/components/schemas/ShipmentEvents"
        notes:
          type: string
          description: Any additional notes related to this specific tracking update.
          example: Weather delay in Kansas City.
      description: Details capturing tracking milestones and estimated delivery information
        for a shipment related to a receipt.
    TrackingInformations:
      type: array
      items:
        $ref: "#/components/schemas/TrackingInformation"
