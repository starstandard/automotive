    LifecycleStatusCollectionEvent:
      title: LifecycleStatusEvents
      maxItems: 1000
      minItems: 1
      type: array
      description: A collection of lifecycle status events representing the historical
        or batch transition logs for an entity.
      example:
      - source_system_code: CRM_01
        lifecycle_status_event_key: EVT-20260206
        transition_to: APPROVED
      items:
        $ref: "#/components/schemas/LifecycleStatusEvent"
    LifecycleStatusEvent:
      title: LifecycleStatusEvent
      required:
      - lifecycle_status_event_key
      - source_system_code
      - transition_date_time
      - transition_from
      - transition_to
      type: object
      properties:
        lifecycle_status_event_key:
          title: Event Key
          pattern: "^EVT-[0-9]{8,12}$"
          type: string
          description: "Unique business identifier for the lifecycle event, following\
            \ the EVT prefix format."
          example: EVT-20260206
        source_system_code:
          title: Source System Code
          maxLength: 20
          minLength: 2
          type: string
          description: The mnemonic code of the system originating the status change.
          example: CRM_SYSTEM_01
        transition_date_time:
          title: Transition Timestamp
          type: string
          description: The exact UTC timestamp when the state transition occurred
            in ISO-8601 format.
          format: date-time
          example: 2026-04-23T11:04:17Z
        transition_from:
          title: Previous State
          type: string
          description: The state the lifecycle is transitioning FROM. Use 'START'
            for new entities.
          example: PENDING
        transition_to:
          title: Target State
          type: string
          description: The state the lifecycle is transitioning TO.
          example: APPROVED
        note:
          title: Transition Note
          maxLength: 1000
          type: string
          description: Audit trail comments or reason codes explaining the transition.
          example: RDR approved by NVS automated matching.
        identifiers:
          title: Related Identifiers
          minItems: 1
          type: array
          description: "A list of business identifiers (e.g., VIN, GUID) associated\
            \ with this lifecycle event."
          example:
          - value: EVT-001
            identifier_type: EVENT
          items:
            $ref: "#/components/schemas/Identifier"
      description: Represents a formal transition event within the entity lifecycle
        workflow.
