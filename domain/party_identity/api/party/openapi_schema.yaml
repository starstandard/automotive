      enum:
      - OVERRIDE
      - NONE
      - MINIMUM
      - LOOSE
      - STANDARD
      - STRICT
      - EXTENSIVE
      - TRUSTED
      - COMPLIANCE
      - CUSTOM
      - UNKNOWN
