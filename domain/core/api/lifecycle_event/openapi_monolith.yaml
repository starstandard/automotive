    parameters:
    - name: lifecycle-event-key
      in: path
      description: The unique identifier for the specific LifecycleEvents
      required: true
      schema:
        type: string
        example: 830095977506770944I
  /lifecycle-event/health:
    get:
      tags:
      - Health
      summary: Health Check
      description: Returns the health status of the LifecycleEvent root node.
      operationId: healthLifecycleEvent
      parameters:
