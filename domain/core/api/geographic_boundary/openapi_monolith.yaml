    post:
      tags:
      - Default
      summary: Initiate a bulk GeographicBoundary export
      description: Standard POST operation for /geographic-boundaries/exports
      operationId: initiateGeographicBoundaryExport
      parameters:
      - name: Idempotency-Key
        in: header
        description: Unique string to prevent duplicate export jobs for the same request
        required: false
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  description: "The serialization format of the exported data. PARQUET\
                    \ is recommended for large-scale analytical processing, while\
                    \ JSON/XML are intended for legacy DMS compatibility."
                  example: PARQUET
                  default: PARQUET
                  enum:
                  - XML
                  - JSON
                  - AVRO
                  - PARQUET
                  - CSV
                  - TOON
                date_range:
                  type: object
                  properties:
                    start:
                      type: string
                      format: date
                      example: 2026-01-14
                    end:
                      type: string
                      format: date
                      example: 2026-01-14
                data_contract_key:
                  type: string
                  description: "The identifier of the specific data contract/projection\
                    \ (e.g., 'customer_contact_v1')"
                  example: contact_details_only
                compression:
                  type: string
                  description: "The compression algorithm to apply. ZSTD is recommended\
                    \ for \nbalancing high compression ratios with blazing decompression\
                    \ speeds."
                  example: ZSTD
                  default: ZSTD
                  enum:
                  - SNAPPY
                  - GZIP
                  - LZO
                  - ZSTD
                compression_level:
                  maximum: 22
                  minimum: 1
                  type: string
                  description: "Tunable intensity for ZSTD. Use lower levels (1-3)\
                    \ for speed, higher levels (19+) for expensive bandwidth scenarios."
                  default: "3"
                destination:
                  type: object
                  properties:
                    retrieval_url:
                      type: string
                      description: The URL where the user intends to receive or pull
                        the data
                      format: uri
                  description: Configuration for file retrieval
                notification:
                  type: object
                  properties:
                    webhook_url:
                      type: string
                      format: uri
                      example: https://client-system.com/callbacks/exports
                    signature_key:
                      type: string
                      description: A secret key used to sign the webhook payload for
                        security
                  description: "Optional: Callback configuration for completion alerts"
                dry_run:
                  type: boolean
                  description: "If true, the system validates the request and returns\
                    \ potential violations or metadata (like estimated size) without\
                    \ starting the job."
                  example: false
                  default: false
              example: PARQUET
      responses:
        "200":
          description: "Dry run results: validation and cost estimation metadata."
          headers:
            Standards-Version:
              $ref: "#/components/headers/StandardsVersionHeader"
            Transaction-Id:
              $ref: "#/components/headers/TransactionIdHeader"
            Link:
              $ref: "#/components/headers/LinkHeader"
            Location:
              description: The URI of the newly created resource.
              schema:
                type: string
                example: /geographic-boundaries/exports/4521175971731238961
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: The outcome of the dry-run evaluation. VALIDATED
                      implies readiness; REJECTED implies blocking violations.
                    example: VALIDATED
                    enum:
                    - VALIDATED
                    - WARNING
                    - REJECTED
                  estimated_metrics:
                    type: object
                    properties:
                      record_count:
                        type: integer
                        description: Total number of source records targeted by the
                          current filter criteria.
                        format: int32
                        example: 1250000
                      estimated_uncompressed_gb:
                        type: number
                        description: The projected raw byte size of the data set before
                          any compression or encoding.
                        example: 4.2
                      estimated_compressed_gb:
                        type: number
                        description: "Projected final footprint based on the chosen\
                          \ compression algorithm (e.g., ZSTD, GZIP)."
                        example: 0.85
                      estimated_processing_time_ms:
                        type: integer
                        description: The estimated wall-clock time required to complete
                          the transformation and upload phase.
                        format: int32
