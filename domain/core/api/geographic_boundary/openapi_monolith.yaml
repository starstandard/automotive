      - name: filter
        in: query
        schema:
          type: integer
          format: int32
          default: 50
      - name: limit
        in: query
        description: The maximum number of entities to return in a single response
          page. Limits the 'data' array size to prevent payload bloat.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 50
      - name: offset
        in: query
        description: The number of entities to skip before starting to collect the
          result set. Used in conjunction with 'limit' for traditional page-based
          navigation.
        required: false
        schema:
          minimum: 0
          type: integer
          format: int32
          default: 0
