          format: int64
          example: 8912734
        expires_at:
          type: string
          description: "The ISO 8601 deadline for initiating the download. After this\
            \ point, the URL will return a 403 Forbidden."
          format: date-time
          example: 2026-03-18T12:00:00Z
      description: "A discrete data artifact representing a segment of the total export\
        \ set, including integrity and access metadata."
    ExportJob:
      type: object
