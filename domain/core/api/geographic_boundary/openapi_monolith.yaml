      description: Unique 5-digit Dealer Identifier.
      required: false
      schema:
        maxLength: 5
        minLength: 5
        type: string
        example: "42278"
    CreatorCodeHeader:
      name: Creator-Code
      in: header
      description: "Source System Identifier (e.g., TY for Toyota, CDK for DMS)."
      required: false
      schema:
        maxLength: 8
        minLength: 2
        type: string
        example: CDK
    SubscriberCodeHeader:
      name: Subscriber-Code
      in: header
      required: false
      schema:
        type: string
        example: 23a7d408-aed4-43f8-8af4-7a17f407m652
    PreferHeader:
      name: Prefer
      in: header
      description: JSON context for field selection and error logging behavior.
      required: false
      schema:
        type: string
        example: "{'logsLabel': {context: 'NNA_API', value: 'RDR API'}}"
    SourceSystemHeader:
      name: Source-System
      in: header
      description: The system originating the transaction pulse.
      required: true
      schema:
        maxLength: 25
        minLength: 2
        type: string
        example: GM_GLOBAL_NVS
    RegionHeader:
      name: Region
      in: header
      description: The geographic or business region code.
      required: false
      schema:
        maxLength: 10
        minLength: 2
        type: string
        example: NE-01
    ApiVersionHeader:
      name: Api-Version
      in: header
      description: API Version
      required: true
      style: simple
      explode: false
      schema:
        type: string
        example: 2.0.0
        enum:
        - 1.0.0
        - 1.0.1
        - 2.0.0
        - 2.0.1
    CountryCodeHeader:
      name: Country-Code
      in: header
      required: true
      style: simple
      explode: false
      schema:
        type: string
        example: "1"
    LocaleHeader:
      name: Locale
      in: header
      required: true
      style: simple
      explode: false
      schema:
        type: string
        example: en-US
    TransactionIdHeader:
      name: Transaction-Id
      in: header
      description: Request ID/ Transaction ID Header Parameter (UUID version 4)
      required: true
      style: simple
      explode: false
      schema:
        type: string
        format: uuid
        example: 16a7d408-aed4-43f8-8af4-7a17f407f799
    UnitIdQuery:
      name: unit_id
      in: query
      description: Vehicle UnitId
      required: false
      schema:
        type: integer
        description: Vehicle UnitId
        format: int32
        example: 129375127
    VINQuery:
      name: vin
      in: query
      description: Vehicle Identification Number
      required: false
      schema:
        type: string
        description: Vehicle Identification Number
        example: 5TFHY5F13KX799310
    StatusQuery:
      name: status
      in: query
      description: Status of RDR to filter for
      required: false
      schema:
        type: string
        description: Status of RDR to filter for
        example: Approved
    StartDateQuery:
      name: start_date
      in: query
      description: The start date (YYYY-MM-DD). Defaults to current date if omitted.
      required: false
      style: form
      explode: true
      schema:
        maxLength: 10
        minLength: 0
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        type: string
        format: date
        example: 2026-02-09
    EndDateQuery:
      name: end_date
      in: query
      description: The end date (YYYY-MM-DD). Defaults to current date + 14 days.
      required: false
      style: form
      explode: true
      schema:
        maxLength: 10
        minLength: 0
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        type: string
        format: date
        example: 2026-02-09
    PageNumberQuery:
      name: page_number
      in: query
      description: The number of returned page
      required: false
      schema:
        maximum: 1000000
        minimum: 1
        type: integer
        format: int32
        default: 1
    PageSizeQuery:
      name: page_size
      in: query
      description: The number of records to return
      required: false
      schema:
        maximum: 600
        minimum: 1
        type: integer
        format: int32
        default: 100
  headers:
    StandardsVersionHeader:
      description: The version of the STAR REST Standard this implementation adheres
        to.
      schema:
        type: string
        example: "2026.1"
    TransactionIdHeader:
      description: Forensic trace UUID echoed back for log reconciliation.
      schema:
        type: string
        format: uuid
        example: 16a7d408-aed4-43f8-8af4-7a17f407f799
    LocationHeader:
      description: The relative or absolute URI of the newly created or modified resource.
      schema:
        type: string
        example: /retail-delivery-reports/2329046043316857069
    LinkHeader:
      description: "RFC 5988 Link header for discovering state-aware transitions (e.g.,\
        \ rel='capabilities')."
      schema:
        type: string
        example: </rdr/99310/capabilities>; rel="capabilities"
  securitySchemes:
    industry-oauth:
      type: oauth2
      description: Centralized OAuth2 service for all industry members
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/token
          scopes:
            standard:read: Read access
    member-api-key:
      type: apiKey
      name: X-API-KEY
      in: header
    bearer-auth:
      type: http
      description: JWT token obtained from authentication service
      scheme: bearer
      bearerFormat: JWT
