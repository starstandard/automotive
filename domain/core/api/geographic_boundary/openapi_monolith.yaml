                $ref: "#/components/responses/ForbiddenError"
        "404":
          description: "Not Found: The requested RDR aggregate does not exist."
          headers:
            Transaction-Id:
              $ref: "#/components/parameters/TransactionIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/responses/NotFoundError"
        "415":
          description: "Unsupported Media Type: Content must be application/json."
          headers:
            Transaction-Id:
              $ref: "#/components/parameters/TransactionIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          description: "Internal Server Error: An unexpected metabolic fault occurred."
          headers:
            Transaction-Id:
              $ref: "#/components/parameters/TransactionIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/responses/ServerError"
        "409":
          description: "Conflict: Resource state mismatch or concurrent update."
          headers:
            Transaction-Id:
              $ref: "#/components/parameters/TransactionIdHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/responses/ConflictError"
components:
  schemas:
    Capabilities:
      type: object
      properties:
        aggregate:
          type: string
          example: GeographicBoundary
        version:
          type: string
          example: 1.2.0
        current_state:
          type: string
          description: The state used to filter these capabilities
          example: PENDING_APPROVAL
        transitions:
          type: array
          description: list of array
          example: "[]"
          items:
            type: object
            properties:
              action:
                type: string
                example: APPROVE_INVOICE
              from_states:
                type: array
                example:
                - PENDING_APPROVAL
                items:
                  type: string
              to_state:
                type: string
                example: ISSUED
              required_roles:
                type: array
                description: Roles authorized to trigger this transition
                example:
                - MANAGER
                - FINANCE_VP
                items:
                  type: string
              links:
                type: object
                properties:
                  execute:
                    type: string
                    description: The relative or absolute URL to POST the command
                      to
                    example: "/geographic-boundaries/{key}/commands/approve"
                  method:
                    type: string
                    example: POST
                    enum:
                    - POST
                    - PUT
                    - PATCH
                  schema_ref:
                    type: string
                    description: Reference to the input payload schema for this action
                    example: "#/components/schemas/GeographicBoundaryCommand"
                description: HATEOAS-style links to execute the transition or fetch
                  related metadata
              _self:
                type: string
                description: Link to the specific transition documentation or detail
                example: /metadata/capabilities/GeographicBoundary/transitions/approve
              instructions:
                type: array
                description: Step-by-step checklist the agent must verify before execution
                example:
                - Verify credit limit is sufficient
                - Confirm tax jurisdiction matches customer address
                - Ensure currency matches original purchase order
                items:
                  type: string
              parameters_ref:
                type: string
                example: "#/components/schemas/GeographicBoundary"
        available_exports:
          type: array
          description: list of array
          example: "[]"
          items:
            type: object
            properties:
              data_contract_key:
                type: string
                example: customer_contact_v1
              description:
                type: string
                example: Optimized view containing only non-sensitive contact details.
              supported_formats:
                type: array
                example:
                - PARQUET
                - CSV
                items:
                  type: string
                  enum:
                  - XML
                  - JSON
                  - AVRO
                  - PARQUET
                  - CSV
                default: PARQUET
              columns:
                type: array
                example:
                - first_name
                - last_name
                - email
                items:
                  type: string
              retention_policy:
                type: object
                properties:
                  retention_period:
                    type: string
                    description: ISO-8601 duration the file remains available for
                      download
                    example: P7D
                  is_pii_sensitive:
                    type: boolean
                    description: Indicates export contains PII
                    example: false
                  access_tier:
                    type: string
                    description: The security clearance required for this contract
                    example: INTERNAL
                    enum:
                    - PUBLIC
                    - INTERNAL
                    - RESTRICTED
                    - CONFIDENTIAL
              constraints:
                type: array
                items:
                  type: object
                  properties:
                    rule_id:
                      type: string
                      description: Unique identifier for the business rule
                      readOnly: true
                      example: IDENTITY_LOCK_STATE
                    constraint_type:
                      type: string
                      enum:
                      - RANGE_LIMIT
                      - SIZE_LIMIT
                      - FORMAT_INCOMPATIBILITY
                      - PATTERN_MISMATCH
                      - PERMISSION_LOCK
                      - MANDATORY_MISSING
                      - STATE_TRANSITION_ERROR
                      - IMMUTABILITY_VIOLATION
                      - RELATIONAL_DEPENDENCY
                      - CONFLICT_DETECTION
                      - AGGREGATE_LIMIT
                      - ORPHAN_PREVENTION
                    target_fields:
                      type: array
                      description: The specific fields or attributes this constraint
                        applies to
                      example:
                      - first_name
                      - last_name
                      - ssn
                      items:
                        type: string
                    rule_context:
                      type: object
                      additionalProperties:
                        type: string
                      description: Key-value pairs representing the 'facts' of the
                        current state
                      example:
                        item_type: Inventory
                        count: "45"
                        limit: "0"
                    rule_constraints:
                      type: object
                      additionalProperties:
                        type: string
                      description: "Key-value pairs for simple UI-driven validation\
                        \ (e.g., min, max, unit). Use this for 'Fast Path' client-side\
                        \ checks."
                      example:
                        min: "1"
                        value: "31"
                        unit: days
                    limit_rule:
                      type: string
                      description: A Prolog-based predicate defining the valid boundary
                        for this constraint.
                      example: "allow_export(Format, Days) :- Format == 'parquet',\
                        \ Days =< 31; Format == 'csv', Days =< 90."
                    estimated_size:
                      type: string
                      description: approximate size of
                      example: 10gig
                    estimated_time_min:
                      type: string
                      description: approximate amount of minutes to run
                      example: "12.3"
                    complexity:
                      type: string
                      description: complexity score 1-100
                      example: "34"
                    mitigation_hint:
                      type: string
                      description: Conflict Resolution Hints
                      example: "To resolve this PERMISSION_LOCK, you must first call\
                        \ the /unlock endpoint."
                    message:
                      type: string
                      description: Human-readable explanation for UI/Logs
                      example: Identity fields cannot be modified while in PENDING_APPROVAL
                        state.
                    severity:
                      type: string
                      enum:
                      - ERROR
                      - WARNING
                    link:
                      type: string
                      description: Link to documentation regarding this rule
                      format: uri
        documentation_ref:
          type: string
          description: Link to full business documentation for this aggregate
          format: uri
          example: /documentation/geographic-boundaries
    Code:
      type: object
      properties:
        code_id:
          maxLength: 50
          minLength: 5
          type: string
          description: The unique key code
          readOnly: true
          example: ' e06e003b'
        code_key:
          maxLength: 50
          minLength: 5
          type: string
          description: The unique key code
          example: ' ee2a0b18'
        code:
          maxLength: 50
          minLength: 5
          type: string
          description: The unique key code
          example: ' 25a896b7'
        description:
          maxLength: 50
          minLength: 5
          type: string
          description: The unique key code
          example: ' c768ba8d'
      description: not nullable
    Codes:
      type: array
      items:
        $ref: "#/components/schemas/Code"
    CommandOption:
      type: object
      properties:
        type:
          type: string
          description: The command name to send to the /commands endpoint
          example: Approve
        description:
          type: string
          description: Guidance for the agent on when to use this command
          example: Moves the invoice to ACTIVE state and triggers the payment gateway.
        target_state:
          type: string
          description: The state the entity will transition to upon success
          example: ACTIVE
    ErrorDetail:
      required:
      - category
      - code
      - message
      - timestamp
      - trace_id
      type: object
      properties:
        code:
          type: string
          description: "A machine-readable, unique system error code."
          example: NOT_FOUND_PR
        message:
          type: string
          description: A developer-friendly explanation of the error.
          example: Personnel Record with ID PR-1234567 was not found.
        category:
          type: string
          description: Classifies the error to help clients determine ...
          example: DATA_INTEGRITY
          enum:
          - VALIDATION
          - AUTHENTICATION
          - AUTHORIZATION
          - INFRASTRUCTURE
          - BUSINESS_LOGIC
          - DATA_INTEGRITY
        timestamp:
          type: string
          description: The time the error occurred (ISO 8601).
          format: date-time
          example: 2025-11-10T10:30:00Z
        trace_id:
          type: string
          description: A unique identifier for this specific request.
          readOnly: true
          example: 57c31110-859a-11ec-a8a3-0242ac120002
        doc_url:
          type: string
          description: A URL leading to the documentation page for thi...
          format: uri
          example: https://api.docs.com/errors/NOT_FOUND_PR
        details:
          type: array
          description: list of array
          example: "[]"
          items:
            type: object
            properties:
              field:
                type: string
                description: The JSON path or field name that caused the error.
                example: payrollId
              issue:
                type: string
                description: The specific validation rule that failed.
                example: must be unique
              rejected_value:
                type: string
                description: The value that was sent and rejected (only if non-sensitive).
                example: "12345"
      description: Standardized error response for the entire API ...
    ExportFile:
      type: object
      properties:
        sequence:
          type: integer
          description: The ordinal position of this file in a multi-part set. Essential
            for reassembling sharded datasets.
          format: int32
          example: 1
        download_url:
          type: string
          description: "A secure, pre-signed URL for direct binary retrieval. Access\
            \ is restricted by the 'expires_at' timestamp."
          format: uri
          example: https://s3.us-east-1.amazonaws.com/star-exports/job-77216/part-1.parquet?X-Amz-Algorithm=AWS4-HMAC-SHA256&...
        format:
          type: string
          description: "The technical encoding of the file, enabling the agent to\
            \ select the correct parser (e.g., Parquet, Avro, CSV)."
          example: PARQUET
        checksum_sha256:
          type: string
          description: The hex-encoded SHA-256 hash of the file. Used by the agent
            to verify bit-level integrity after download.
          example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
        size_bytes:
