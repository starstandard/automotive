components:
  schemas:
    Code:
      type: object
      properties:
        code_id:
          maxLength: 50
          minLength: 5
          type: string
          description: Internal system-generated unique identifier for the code record.
          example: cd-9902-v1
        code_key:
          maxLength: 50
          minLength: 5
          type: string
          description: Unique business reference key used to identify the code's context.
          example: VEHICLE_STATUS_CODE
        code:
          maxLength: 50
          minLength: 1
          type: string
          description: The literal value or mnemonic represented by this record.
          example: IN_TRANSIT
        description:
          maxLength: 255
          minLength: 5
          type: string
          description: A human-readable explanation of what the code represents.
          example: Indicates the vehicle has left the factory but not yet arrived
            at the dealer.
      description: not nullable
    Codes:
      type: array
      items:
        $ref: "#/components/schemas/Code"
    ErrorDetail:
      required:
      - category
      - code
      - message
      - timestamp
      - trace_id
      type: object
      properties:
        code:
          type: string
          description: "A machine-readable, unique system error code."
          example: NOT_FOUND_PR
        message:
          type: string
          description: A developer-friendly explanation of the error.
          example: Personnel Record with ID PR-1234567 was not found.
        category:
          type: string
          description: Classifies the error to help clients determine high-level retry
            or handling logic.
          example: DATA_INTEGRITY
          enum:
          - VALIDATION
          - AUTHENTICATION
          - AUTHORIZATION
          - INFRASTRUCTURE
          - BUSINESS_LOGIC
          - DATA_INTEGRITY
        timestamp:
          type: string
          description: The time the error occurred (ISO 8601).
          format: date-time
          example: 2025-11-10T10:30:00Z
        trace_id:
          type: string
          description: A unique identifier for this specific request.
          example: 57c31110-859a-11ec-a8a3-0242ac120002
        doc_url:
          type: string
          description: A URL leading to the documentation page for this specific error
            code.
          format: uri
          example: https://api.docs.com/errors/NOT_FOUND_PR
        details:
          type: array
          description: Field-level validation errors or granular diagnostic information.
          example:
          - variance: 2000
            actual: 12000
            budget: 10000
            account: GL-1000
          - variance: -500
            actual: 4500
            budget: 5000
            account: GL-2000
          items:
            type: object
            properties:
              field:
                type: string
                description: The JSON path or field name that caused the error.
                example: payrollId
              issue:
                type: string
                description: The specific validation rule that failed.
                example: must be unique
              rejected_value:
                type: string
                description: The value that was sent and rejected (only if non-sensitive).
                example: "12345"
      description: Standardized error response for the entire API ecosystem. Follows
        RFC 7807 principles for problem details to ensure consistency across microservices.
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          description: Current health status of the service.
          example: UP
        version:
          type: string
          description: Version of the deployed service.
          example: 2.0.0
      description: Standard health check response body
    Identifier:
      type: object
      properties:
        identifier_id:
          maxLength: 50
          minLength: 5
          type: string
          description: Unique identifier value
          example: "840277004555288576"
        identifier_key:
          maxLength: 50
          minLength: 5
          type: string
          description: Business key for the identifier
          example: "840277004555288577"
        context:
          type: string
          description: Context or domain of the identifier
          example: FINANCE
        value:
          type: string
          description: The monetary or hours-based value of the event.
          example: user@example.com
        detail:
          type: string
          description: The monetary or hours-based value of the event.
          example: Primary identifier
        identifier_type:
          type: string
          description: The monetary or hours-based value of the event.
          example: identifier_type value
        system_codes:
          $ref: "#/components/schemas/Codes"
      description: External system identifier
    Identifiers:
      type: array
      items:
        $ref: "#/components/schemas/Identifier"
    PartConditionTypes:
      type: string
      description: types of part conditions.
      example: NEW
      enum:
      - NEW
      - NEW_OLD_STOCK
      - REMANUFACTURED
      - REBUILT
      - REFURBISHED
      - USED
      - SALVAGE
      - DAMAGED_MINOR
      - DAMAGED_COSMETIC
      - SCRAP
      - COLLECTIBLE
      - OTHER
    PartIdentifier:
      type: object
      properties:
        part_identifier_key:
          type: string
          description: Unique key identifying the part identifier
          example: "840277004555288578"
        part_identifier_id:
          type: string
          description: Unique identifier ID for the part identifier
          example: "840277004555288579"
        part_source:
          type: string
          description: Unique identifier ID for the source of the part
          example: OEM
        part_identifier_type:
          $ref: "#/components/schemas/PartIdentifierTypes"
        part_identifier_value:
          type: string
          description: Value of the part identifier
          example: PART-123456
        description:
          type: string
          description: Optional description for the part identifier
          example: Vehicle engine component.
        identifiers:
          $ref: "#/components/schemas/Identifiers"
        part_names:
          $ref: "#/components/schemas/PartNames"
        part_status_type:
          $ref: "#/components/schemas/PartStatusTypes"
      description: nullable
    PartIdentifierTypes:
      type: string
      description: types of part identifiers.
      example: VIN
      enum:
      - VIN
      - SKU
      - UPCA
      - UPCE
      - ISBN
      - MPN
      - CONFIG_CODE
      - MFR_CODE
      - ALT_CODE
      - STOCK_NBR
      - UNIV_CODE
      - PRODUCT_CODE
      - CATALOG_CODE
      - NAME
      - NUMBER
      - PREFIX
      - COUNTRY_OF_ORIGIN_CODE
      - MODEL_CODE
      - MAKE_CODE
      - YEAR_CODE
      - MARKET_DIVISION_CODE
      - TRIM_CODE
      - STYLE_CODE
      - SUB_MODEL_CODE
      - ENGINE_CODE
      - TRANSMISSION_CODE
      - DRAWING_NUMBER
      - OTHER
    PartName:
      type: object
      properties:
        part_name_id:
          type: string
          description: Unique identifier for the part name
          example: "840277004555288580"
        part_name_key:
          type: string
          description: Business key for the part name
          example: "840277004555288581"
        part_prefix:
          $ref: "#/components/schemas/Codes"
        part_suffix:
          $ref: "#/components/schemas/Codes"
        description:
          type: string
          description: Description of the part name
          example: Vehicle engine component.
        language:
          $ref: "#/components/schemas/Codes"
        locale:
          $ref: "#/components/schemas/Codes"
        alias:
          $ref: "#/components/schemas/Codes"
        long_name:
          $ref: "#/components/schemas/Codes"
        marketing_name:
          $ref: "#/components/schemas/Codes"
        part_name_type:
          $ref: "#/components/schemas/PartNameTypes"
        part_number:
          $ref: "#/components/schemas/Codes"
      description: nullable
    PartNameTypes:
      type: string
      description: types of part names.
      example: GENERIC
      enum:
      - GENERIC
      - MANUFACTURING
      - MARKETING
      - CORE
      - REMANUFACTURING
      - OEM
      - AFTERMARKET
      - SUPERSEDING
      - SUPERSEDED
    PartNames:
      type: array
      items:
        $ref: "#/components/schemas/PartName"
    PartPriceCriteria:
      type: object
      properties:
        part_price_criteria_id:
          type: string
          description: "Descriptive name or keyword for the part (e.g., 'Brake Rotor',\
            \ 'Oil Filter')."
          example: Front Brake Rotor
        part_price_criteria_key:
          type: string
          description: "Descriptive name or keyword for the part (e.g., 'Brake Rotor',\
            \ 'Oil Filter')."
          example: Front Brake Rotor
        min_price:
          type: string
          description: Minimum price of the part.
          example: "10.00"
        max_price:
          type: string
          description: Maximum price of the part.
          example: "100.00"
        currency:
          type: string
          description: "Currency for price filtering (e.g., 'USD', 'EUR')."
          example: USD
        core_charge_applicable:
          type: boolean
          description: "If true, only parts with an applicable core charge are returned.\
            \ If false, parts without core charge."
          example: true
        warranty_types:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          description: warranty_types list
          example:
          - MANUFACTURER
          items:
            $ref: "#/components/schemas/WarrantyTypes"
        price_types:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          description: price_types list
          example:
          - ADJUSTED_MSRP
          items:
            $ref: "#/components/schemas/PriceTypes"
      description: Criteria for filtering by commercial terms and logistics details.
    PartSearch:
      type: object
      properties:
        part_search_id:
          type: string
          description: The status of the search operation.
          example: SUCCESS
        part_search_key:
          type: string
          description: The status of the search operation.
          example: SUCCESS
        part_search_criteria_key:
          type: string
          description: The status of the search operation.
          example: SUCCESS
        search_status:
          type: string
          description: The status of the search operation.
          example: SUCCESS
        results_count:
          type: integer
          description: The number of PartSearchResult items returned.
          format: int32
          example: 1
        part_search_results:
          $ref: "#/components/schemas/PartSearchResults"
        warehouses:
          $ref: "#/components/schemas/Identifiers"
      description: "The final  object for a part search query, containing status and\
        \ a list of matching part records."
    PartSearchCreate:
      required:
      - part_search_key
      type: object
      description: PartSearch Create for Post
      allOf:
      - $ref: "#/components/schemas/PartSearch"
    PartSearchResult:
      type: object
      properties:
        part_search_result_id:
          type: string
          description: Unique identifier for the part (can be master ID or a specific
            inventory ID).
          example: PM_45678
        part_search_result_key:
          type: string
          description: Unique identifier for the part (can be master ID or a specific
            inventory ID).
          example: PM_45678
        part_key:
          type: string
          description: Unique identifier for the part (can be master ID or a specific
            inventory ID).
          example: PM_45678
        is_master_record:
          type: boolean
          description: Indicates if this result represents the foundational Part Master
            record.
          example: true
        part_identifiers:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          description: "List of unique identifiers associated with the part (e.g.,\
            \ OEM, aftermarket, supplier codes)."
          example:
          - variance: 2000
            actual: 12000
            budget: 10000
            account: GL-1000
          - variance: -500
            actual: 4500
            budget: 5000
            account: GL-2000
          items:
            $ref: "#/components/schemas/PartIdentifier"
        part_names:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          description: List of names or descriptions associated with the part.
          example:
          - variance: 2000
            actual: 12000
            budget: 10000
            account: GL-1000
          - variance: -500
            actual: 4500
            budget: 5000
            account: GL-2000
          items:
            $ref: "#/components/schemas/PartName"
        part_condition_type:
          $ref: "#/components/schemas/PartConditionTypes"
        quantity_available:
          type: integer
          description: The total quantity available across all matching logistics/inventory
            records.
          format: int32
          example: 1700
        primary_warehouse:
          $ref: "#/components/schemas/Identifier"
        part_price:
          $ref: "#/components/schemas/PartPriceCriteria"
        bill_of_material:
          $ref: "#/components/schemas/Identifier"
        part_status_type:
          $ref: "#/components/schemas/PartStatusTypes"
        estimated_availability_date:
          type: string
          description: The earliest date/time this part is expected to be available
            from the matched location.
          format: date
          example: 2026-04-25
        origin_latitude:
          type: string
          description: Latitude of the part's physical location or aggregation point.
          example: "34.0522"
        origin_longitude:
          type: string
          description: Longitude of the part's physical location or aggregation point.
          example: "-118.2437"
        shipping_method_types:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          description: shipping_method_types list
          example:
          - OCEAN_FREIGHT
          items:
            $ref: "#/components/schemas/ShippingMethodTypes"
      description: "A consolidated record representing a single part found by the\
        \ search criteria, including master data and aggregated inventory/price details."
    PartSearchResults:
      type: array
      items:
        $ref: "#/components/schemas/PartSearchResult"
    PartSearchUpdate:
      type: object
      properties:
        search_status:
          type: string
          description: The status of the search operation.
          example: SUCCESS
        results_count:
          type: integer
          description: The number of PartSearchResult items returned.
          format: int32
          example: 1
        warehouses:
          $ref: "#/components/schemas/Identifiers"
        part_search_results:
          $ref: "#/components/schemas/PartSearchResults"
      description: PartSearch Update for Patch and Put
    PartStatusTypes:
      type: string
      description: types of part status.
      example: RECEIVE
      enum:
      - RECEIVE
      - INSPECT_INBOUND
      - DOCUMENT_RECEIPT
      - PUTAWAY
      - QUARANTINE_INBOUND
      - PICK
      - PACK
      - STAGE_SHIPMENT
      - LOAD_SHIPMENT
      - SHIP
      - DOCUMENT_SHIPMENT
      - SCRAP_DISPOSE
      - DISASSEMBLE
      - RETURN_RECEIVE
      - RETURN_INSPECT
      - RETURN_PUTAWAY
      - REFURBISH_REPAIR
      - RETURN_TO_BIN
      - DEFECTIVE_REMOVAL
      - ALLOCATE_TO_JOB
      - PICK_FOR_LABOR
      - STAGE_FOR_SERVICE
      - ISSUE_TO_TECH
      - INSTALLED
      - CORE_PENDING
      - CORE_RECEIVED
      - CROSS_DOCK
      - LABEL_TAG
      - KIT_ASSEMBLE
      - VALUE_ADDED_SERVICE
      - SUPERSEDE
      - SUPERSEDED
    PriceTypes:
      type: string
