            record.
        is_hazardous:
          type: boolean
          description: Indicates if the part is classified as hazardous material.
          example: true
        is_environmental_regulated:
          type: boolean
          description: Indicates if the part is subject to environmental regulations.
          example: false
        export_control_class_number:
          pattern: "^[0-9A-Z]{5}$"
          type: string
          description: Export control classification number (ECCN) if applicable.
          example: 3A001
