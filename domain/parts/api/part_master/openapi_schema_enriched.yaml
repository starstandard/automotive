          type: string
          description: Version or date of the Safety Data Sheet (SDS).
          example: "2.1"
        sds_external_link:
          pattern: "^(https?|ftp)://[-a-zA-Z0-9+&@#/%?=~_|!:,.;]*[-a-zA-Z0-9+&@#/%=~_|]"
