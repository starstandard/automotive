components:
  schemas:
    Address:
      type: object
      properties:
        address_locales:
          $ref: "#/components/schemas/AddressLocales"
        priority:
          maxLength: 10
          minLength: 1
          type: string
          description: "Priority indicator for address usage (e.g., billing, shipping)."
          example: "1"
        city_code:
          maxLength: 20
          minLength: 1
          type: string
          description: Standardized city code.
          example: ATL
        address_key:
          maxLength: 50
          minLength: 5
          type: string
          description: Unique business key for the address.
          example: "840277003305385984"
        address_id:
          maxLength: 50
          minLength: 5
          type: string
          description: Unique identifier for the address record.
          example: "840277003305385985"
        address_input:
          maxLength: 255
          minLength: 1
          type: string
          description: Raw input provided for address processing or validation.
          example: "123 Main St, Atlanta, GA 30303"
        address_line1:
          maxLength: 100
          minLength: 1
          type: string
          description: "Primary address line (Street, PO Box, etc)."
          example: 123 Main St
        address_line2:
          maxLength: 100
          type: string
          description: "Secondary address line (Suite, Apt, etc)."
          example: Suite 400
        address_line3:
          maxLength: 100
          type: string
          description: Additional address line information.
          example: Building A
        address_line4:
          maxLength: 100
          type: string
          description: Additional address line information.
          example: Mail Stop 22
        address_line5:
          maxLength: 100
          type: string
          description: Additional address line information.
          example: "Attention: Accounts Payable"
        address_types:
          maxItems: 255
          minItems: 1
          uniqueItems: true
          type: array
          description: address_types list
          example:
          - AR_ADDRESS
          items:
            $ref: "#/components/schemas/AddressTypes"
        authorization_levels:
          $ref: "#/components/schemas/AuthorizationLevels"
        city:
          maxLength: 100
          minLength: 1
          type: string
          description: Name of the city.
          example: Atlanta
        city_subdivision:
          maxLength: 100
          type: string
          description: "Subdivision within the city (e.g., neighborhood, district)."
          example: Midtown
        country:
          maxLength: 100
          minLength: 2
          type: string
          description: Full name of the country.
          example: United States
        country_code:
          maxLength: 2
          minLength: 2
          type: string
          description: ISO 3166-1 Alpha-2 country code.
          example: US
        county:
          maxLength: 100
          type: string
          description: Name of the county.
          example: Fulton
        county_code:
          maxLength: 20
          type: string
          description: Standardized code for the county.
          example: "121"
        label:
          maxLength: 50
          type: string
          description: Label or display name for the address.
          example: Work Email
        position:
          $ref: "#/components/schemas/Position"
        postal_code:
          maxLength: 20
          minLength: 3
          type: string
          description: Primary postal or ZIP code.
          example: "30303"
        postal_code_ext:
          maxLength: 10
          type: string
          description: "Extended postal code (e.g., ZIP+4)."
          example: "1234"
        preferred_indicator:
          type: boolean
          description: Flag indicating if this address is the preferred address.
          example: false
        region:
          maxLength: 50
          type: string
          description: "Administrative region (e.g., province, state)."
          example: Southeast
        state:
          maxLength: 50
          type: string
          description: State or equivalent subdivision.
          example: GA
      description: Address represents a physical or mailing location associated with
        a party or warehouse.
    AddressLocale:
      type: object
      properties:
        address_locale_key:
          type: string
          description: Business key for the address locale.
          example: "840277003305385986"
        address_locale_id:
          type: string
          description: Unique identifier for the address locale.
          example: "840277003305385987"
        region_code:
          type: string
          description: Code representing the region for the locale.
          example: GA
        region_name:
          type: string
          description: Name of the region for the locale.
          example: Georgia
        region_aliases:
          $ref: "#/components/schemas/Codes"
        location_type:
          $ref: "#/components/schemas/LocationTypes"
      description: External system address locale including region and location type.
    AddressLocales:
      type: array
      items:
        $ref: "#/components/schemas/AddressLocale"
    AddressTypes:
      type: string
      description: types of address.
      example: BILLING
      enum:
      - BILLING
      - SHIPPING
      - MAILING
      - POSTAL
      - HOME
      - RESIDENCE
      - WORK
      - BUSINESS
      - OFFICE
      - PO_BOX
      - LEGAL
      - SERVICE
      - DEALER
      - CONTRACT
      - AR_ADDRESS
      - RECIPIENT
      - DELIVERY
      - DESTINATION
      - ORIGINAL
      - CURRENT
      - PREVIOUS
      - TEMPORARY
      - VACATION
      - GARAGE
      - EMERGENCY
      - REBATE
      - SERVICE_CONTRACT
      - INSURANCE
      - PRODUCT
      - ARCHIVE
      - OTHER
    AuthorizationLevel:
      type: object
      properties:
        update_date_time:
          type: string
          description: Timestamp of the last update to this authorization
          format: date-time
          example: 2026-05-07T17:18:21Z
        authorized_indicator:
          type: boolean
          description: Indicates whether the authorization is currently active or
            granted
          example: false
        authorization_level_key:
          type: string
          description: Business key uniquely identifying the authorization
          example: "840277003305385988"
        auth_codes:
          $ref: "#/components/schemas/Codes"
      description: Establish authorization level
    AuthorizationLevels:
      type: array
      items:
        $ref: "#/components/schemas/AuthorizationLevel"
    BankAccountTypes:
      type: string
      description: types of bank accounts.
      example: CHECKING
      enum:
      - CHECKING
      - SAVING
      - MONEY_MARKET
      - CD
      - BROKERAGE
      - RETIREMENT
      - OTHER
    BankBeneficiary:
      type: object
      properties:
        bank_beneficiary_key:
          type: string
          description: A unique key for the bank beneficiary record.
          example: "840277003305385989"
        account_number:
          type: string
          description: The bank account number of the beneficiary.
          example: "59"
        address_desc:
          type: string
          description: A description of the beneficiary's address.
          example: "123 Peachtree Street NE, Atlanta, GA 30303"
        bank_account_type:
          $ref: "#/components/schemas/BankAccountTypes"
        bank_branch_address_desc:
          type: string
          description: A description of the bank branch address.
          example: "100 Bank Plaza, Atlanta, GA 30303"
        bank_country:
          type: string
          description: The country of the bank.
          example: US
        bank_name:
          type: string
          description: The name of the bank.
          example: Bank of America
        bank_swift_code:
          type: string
          description: The bank's SWIFT code.
          example: BOFAUS3N
        branch_number:
          type: string
          description: The bank branch number.
          example: "92"
        budget_code:
          type: string
          description: The budget code associated with the payment.
          example: BUD-2026-001
        contact_channel_desc:
          type: string
          description: A description of the contact channel for the beneficiary.
          example: Primary treasury contact email.
        electronic_payment_id:
          type: string
          description: The ID for the electronic payment.
          example: "840277003305385990"
        notes:
          $ref: "#/components/schemas/Memo"
        purpose_of_payment:
          type: string
          description: The purpose of the payment.
          example: Vendor invoice payment
        routing_number:
          type: string
          description: The bank's routing number.
          example: "86"
      description: Beneficiary for Bank Payment...
    BankIntermediary:
      type: object
      properties:
        bank_intermediary_key:
          type: string
          description: The unique key for the bank intermediary record.
          example: "840277003305385991"
        bank_intermediary_id:
          type: string
          description: The unique ID for the bank intermediary.
