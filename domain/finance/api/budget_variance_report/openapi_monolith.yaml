    EndDateQuery:
      name: end_date
      in: query
      description: The end date (YYYY-MM-DD). Defaults to current date + 14 days.
      required: false
      style: form
      explode: true
      schema:
        maxLength: 10
        minLength: 10
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        type: string
        format: date
        example: 2026-02-09
    IfNoneMatchHeader:
      name: If-None-Match
      in: header
      description: Used for conditional GETs. The operation is executed only if the
        stored ETag does not match this value. Prevents 'Lost Updates' in high-concurrency
        Service Bounded Contexts.
      required: false
      style: simple
      explode: false
      schema:
        pattern: "^\"?[a-f0-9]+\"?$|^\\*$"
        type: string
        example: '"686897696a7c876b7e"'
    StartDateQuery:
      name: start_date
      in: query
      description: The start date (YYYY-MM-DD). Defaults to current date if omitted.
      required: false
      style: form
      explode: true
      schema:
        maxLength: 10
        minLength: 10
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        type: string
        format: date
        example: 2026-02-09
    CountryCodeHeader:
